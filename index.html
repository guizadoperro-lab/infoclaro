<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Início</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      background: #ffffff; /* fundo branco */
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* IMAGEM CENTRAL (não distorce) */
    .logo {
      max-width: 90%;
      max-height: 60vh;
      object-fit: contain;
    }

    /* BOTÃO CENTRAL */
    .btn-central {
      position: absolute;
      top: 65%;
      left: 50%;
      transform: translate(-50%, -50%);
      
      padding: 14px 30px;
      background: red;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-size: 18px;
      transition: 0.3s;
    }

    .btn-central:hover {
      background: darkred;
      transform: translate(-50%, -50%) scale(1.05);
    }

    /* RESPONSIVO */
    @media (max-width: 768px) {
      .logo {
        max-width: 95%;
        max-height: 50vh;
      }

      .btn-central {
        font-size: 16px;
        padding: 12px 25px;
        top: 70%;
      }
    }
  </style>
</head>

<body>

  <img src="logo.jpg" class="logo" alt="Logo">

  <a href="pagina2.html" class="btn-central">Continuar</a>

</body>
</html>
