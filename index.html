<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Info Claro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

/* FUNDO */
body{
  background:#0b0f1a;
  color:white;
}

/* HEADER */
header{
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
  background:rgba(15,20,40,0.7);
  backdrop-filter:blur(10px);
}

/* ICONES */
.icons span{
  margin-left:15px;
  cursor:pointer;
}

/* BUSCA */
.search-box{
  position:fixed;
  top:70px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:10px 20px;
  border-radius:20px;
  display:none;
}

.search-box input{
  border:none;
  outline:none;
}

/* MENU */
.menu{
  position:fixed;
  right:-250px;
  top:0;
  width:250px;
  height:100%;
  background:#111;
  padding:20px;
  transition:0.3s;
}

.menu.active{right:0;}

.menu a{
  display:block;
  margin:15px 0;
  color:#ccc;
  text-decoration:none;
}

/* HERO */
.hero{
  margin-top:120px;
  text-align:center;
  padding:20px;
}

h1{font-size:2rem;margin-bottom:20px;}

.container{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
}

/* BOTÃO */
.btn{
  display:inline-block;
  margin-top:15px;
  padding:10px 20px;
  background:#007BFF;
  border-radius:20px;
  color:white;
  text-decoration:none;
}

/* HIGHLIGHT */
.highlight{
  background:yellow;
  color:black;
}
</style>
</head>

<body>

<header>
  <div>Info Claro</div>
  <div class="icons">
    <span onclick="toggleSearch()">🔍</span>
    <span onclick="toggleMenu()">☰</span>
  </div>
</header>

<!-- BUSCA -->
<div class="search-box" id="searchBox">
  <input type="text" id="searchInput" placeholder="Pesquisar..." onkeyup="searchContent()">
</div>

<!-- MENU -->
<div class="menu" id="menu">
  <a href="index.html">Início</a>
  <a href="quem-somos.html">Quem somos</a>
  <a href="faq.html">Perguntas</a>
</div>

<!-- CONTEÚDO -->
<section class="hero">

  <h1 id="titulo">
    Com a <strong>Info Claro</strong>, você volta a entender o mundo com facilidade
  </h1>

  <div class="container" id="conteudo">

    <p>
      Somos a Info Claro, uma empresa que transforma conteúdos complexos em algo simples,
      ajudando pessoas a terem mais autonomia e inclusão digital.
    </p>

    <a href="quem-somos.html" class="btn">SAIBA MAIS</a>

  </div>

</section>

<script>
function toggleSearch(){
  const box = document.getElementById("searchBox");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

function toggleMenu(){
  document.getElementById("menu").classList.toggle("active");
}

/* BUSCA */
function searchContent(){
  let input = document.getElementById("searchInput").value.toLowerCase();
  let content = document.getElementById("conteudo");

  content.innerHTML = content.innerHTML.replace(/<span class="highlight">(.*?)<\/span>/g, "$1");

  if(input.length > 1){
    let regex = new RegExp(`(${input})`, "gi");
    content.innerHTML = content.innerHTML.replace(regex, `<span class="highlight">$1</span>`);

    let first = document.querySelector(".highlight");
    if(first){
      first.scrollIntoView({behavior:"smooth", block:"center"});
    }
  }
}
</script>

</body>
</html>
