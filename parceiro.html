<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seja Parceiro - Info Claro</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', sans-serif;
}

body{
  background:radial-gradient(circle at top,#0b1020,#020617);
  color:white;
}

/* TOPO */
.topo{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(10,15,30,.7);
  backdrop-filter:blur(12px);
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:1000;
}

.logo{
  font-size:22px;
  font-weight:bold;
}

.icons span{
  font-size:22px;
  cursor:pointer;
}

/* MENU */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  opacity:0;
  pointer-events:none;
  transition:.3s;
  z-index:998;
}

.overlay.active{
  opacity:1;
  pointer-events:auto;
}

.menu{
  position:fixed;
  top:0;
  right:-280px;
  width:280px;
  height:100%;
  background:#111;
  padding:20px;
  transition:.35s ease;
  z-index:9999;
}

.menu.active{right:0;}

.menu-header{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
  color:white;
}

.fechar{
  cursor:pointer;
  color:#00bfff;
  font-size:22px;
}

.menu a{
  display:block;
  margin:15px 0;
  color:#cfd8ff;
  text-decoration:none;
}

.menu a:hover{
  color:#00bfff;
}

/* CONTAINER */
.container{
  margin-top:120px;
  display:flex;
  justify-content:center;
  padding:20px;
}

/* CARD */
.card{
  width:100%;
  max-width:500px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(0,191,255,0.2);
  backdrop-filter:blur(10px);
  border-radius:18px;
  padding:25px;
  box-shadow:0 0 30px rgba(0,191,255,0.1);
}

.card h1{
  text-align:center;
  color:#00bfff;
  margin-bottom:20px;
}

/* INPUTS */
input, textarea{
  width:100%;
  padding:14px;
  margin-bottom:15px;
  border-radius:12px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.08);
  color:white;
  font-size:15px;
}

textarea{
  resize:none;
  height:120px;
}

/* BOTÃO */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#00bfff;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  background:#0099dd;
  transform:scale(1.02);
}

/* SUCESSO */
.sucesso{
  display:none;
  text-align:center;
  margin-top:15px;
  color:#00ff99;
}
</style>
</head>

<body>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="fecharMenu()"></div>

<!-- TOPO -->
<div class="topo">
  <div class="logo">Info Claro</div>
  <div class="icons">
    <span onclick="abrirMenu()">☰</span>
  </div>
</div>

<!-- MENU -->
<div class="menu" id="menu">

  <div class="menu-header">
    <span>Menu</span>
    <span class="fechar" onclick="fecharMenu()">✕</span>
  </div>

  <a href="index.html">🏠 Quem somos</a>
  <a href="produto.html">📦 Nosso produto</a>
  <a href="proposito.html">🎯 Nosso propósito</a>
  <a href="faq.html">❓ Dúvidas</a>
  <a href="parceiro.html">🤝 Seja parceiro</a>

</div>

<!-- FORM -->
<div class="container">

<div class="card">

<h1>🤝 Seja Parceiro</h1>

<input id="nome" placeholder="Nome completo">
<input id="email" placeholder="Seu email (@gmail.com)">
<textarea id="msg" placeholder="Como deseja contribuir?"></textarea>

<button onclick="enviar()">Enviar proposta</button>

<div class="sucesso" id="sucesso">
  Email enviado com sucesso ✔ Aguarde contato.
</div>

</div>

</div>

<script>

/* MENU */
function abrirMenu(){
  document.getElementById("menu").classList.add("active");
  document.getElementById("overlay").classList.add("active");
}

function fecharMenu(){
  document.getElementById("menu").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");
}

/* VALIDAÇÃO + ENVIO VISUAL */
function enviar(){

  let nome=document.getElementById("nome").value.trim();
  let email=document.getElementById("email").value.trim();
  let msg=document.getElementById("msg").value.trim();

  if(nome.length<3){
    alert("Digite um nome válido");
    return;
  }

  if(!email.endsWith("@gmail.com")){
    alert("Use um email Gmail válido");
    return;
  }

  if(msg.length<10){
    alert("Descreva melhor sua contribuição");
    return;
  }

  document.getElementById("sucesso").style.display="block";

  setTimeout(()=>{
    document.getElementById("nome").value="";
    document.getElementById("email").value="";
    document.getElementById("msg").value="";
  },800);
}

</script>

</body>
</html>
