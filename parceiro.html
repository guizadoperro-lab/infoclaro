<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seja Parceiro - Info Claro</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', sans-serif;
}

body{
  background:#020617;
  color:white;
}

/* TOPO */
.topo{
  position:fixed;
  top:0;
  width:100%;
  background:#020617;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  z-index:1000;
}

.logo{font-size:22px;font-weight:bold;}

.icons span{cursor:pointer;font-size:22px;}

/* MENU */
.menu{
  position:fixed;
  right:-260px;
  top:0;
  width:260px;
  height:100%;
  background:#111;
  padding:20px;
  transition:0.3s;
}

.menu.active{right:0;}

.menu a{
  display:block;
  margin:15px 0;
  color:#ccc;
  text-decoration:none;
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
}

.overlay.active{display:block;}

/* CONTEÚDO */
.container{
  margin-top:110px;
  padding:25px;
  max-width:600px;
  margin:auto;
}

h1{margin-bottom:15px;}

p{color:#cbd5f5;margin-bottom:20px;}

/* FORM */
.form{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:12px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  background:#00bfff;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* ALERTA */
.alerta{
  margin-top:15px;
  padding:12px;
  border-radius:8px;
  display:none;
  text-align:center;
}

.sucesso{background:#16a34a;}
.erro{background:#dc2626;}

</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="topo">
  <div class="logo">Info Claro</div>
  <div class="icons">
    <span onclick="toggleMenu()">☰</span>
  </div>
</div>

<div class="menu" id="menu">
  <a href="index.html">Quem somos</a>
  <a href="produto.html">Nosso produto</a>
  <a href="faq.html">Dúvidas</a>
  <a href="parceiro.html">Seja parceiro</a>
</div>

<div class="container">

<h1>🤝 Seja um parceiro</h1>

<p>
Preencha os dados abaixo para colaborar com o projeto Info Claro.
</p>

<div class="form">
<input id="nome" placeholder="Nome e Sobrenome">
<input id="email" placeholder="Email (@gmail.com)">
<textarea id="mensagem" rows="4" placeholder="Como deseja contribuir?"></textarea>
<button onclick="enviar()">Enviar</button>

<div id="alerta" class="alerta"></div>
</div>

</div>

<script>

/* MENU */
function toggleMenu(){
  document.getElementById("menu").classList.add("active");
  document.getElementById("overlay").classList.add("active");
}

function closeMenu(){
  document.getElementById("menu").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");
}

/* VALIDAÇÃO */
function validarNome(nome){
  return /^[A-Za-zÀ-ÿ]+\\s+[A-Za-zÀ-ÿ]+/.test(nome);
}

function validarEmail(email){
  return /^[a-zA-Z0-9._%+-]+@gmail\\.com$/.test(email);
}

function enviar(){

  let nome = document.getElementById("nome").value.trim();
  let email = document.getElementById("email").value.trim();
  let msg = document.getElementById("mensagem").value.trim();
  let alerta = document.getElementById("alerta");

  alerta.style.display="block";

  if(!validarNome(nome)){
    alerta.className="alerta erro";
    alerta.innerText="Digite nome e sobrenome válidos.";
    return;
  }

  if(!validarEmail(email)){
    alerta.className="alerta erro";
    alerta.innerText="Use um email válido (@gmail.com).";
    return;
  }

  if(msg.length < 5){
    alerta.className="alerta erro";
    alerta.innerText="Descreva melhor sua contribuição.";
    return;
  }

  /* SIMULA ENVIO */
  alerta.className="alerta sucesso";
  alerta.innerText="Email enviado, por favor aguarde...";

  setTimeout(()=>{
    alerta.innerText="Mensagem enviada com sucesso!";
  },2000);

}
</script>

</body>
</html>
